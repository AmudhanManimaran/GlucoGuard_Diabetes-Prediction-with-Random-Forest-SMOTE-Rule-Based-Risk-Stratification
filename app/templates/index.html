<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diabetes Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f7f9fc;
        }
        .form-container {
            max-width: 600px;
            margin: 40px auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-4">🩺 Diabetes Prediction</h2>
            <form method="POST">
                <div class="mb-3">
                    <label for="pregnancies" class="form-label">Pregnancies</label>
                    <input type="number" step="1" class="form-control" name="pregnancies" required>
                </div>

                <div class="mb-3">
                    <label for="glucose" class="form-label">Glucose</label>
                    <input type="number" class="form-control" name="glucose" required>
                </div>

                <div class="mb-3">
                    <label for="blood_pressure" class="form-label">Blood Pressure</label>
                    <input type="number" class="form-control" name="blood_pressure" required>
                </div>

                <div class="mb-3">
                    <label for="skin_thickness" class="form-label">Skin Thickness</label>
                    <input type="number" class="form-control" name="skin_thickness" required>
                </div>

                <div class="mb-3">
                    <label for="insulin" class="form-label">Insulin</label>
                    <input type="number" class="form-control" name="insulin" required>
                </div>

                <div class="mb-3">
                    <label for="bmi" class="form-label">BMI</label>
                    <input type="text" class="form-control" name="bmi" required>
                </div>

                <div class="mb-3">
                    <label for="dpf" class="form-label">Diabetes Pedigree Function</label>
                    <input type="text" class="form-control" name="dpf" required>
                </div>

                <div class="mb-3">
                    <label for="age" class="form-label">Age</label>
                    <input type="number" class="form-control" name="age" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Predict</button>
            </form>

            {% if result %}
            <div class="result-box bg-light text-dark mt-4">
                <strong>Prediction:</strong> {{ result }}
            </div>
            {% endif %}

            {% if risk_level %}
            <div class="result-box bg-warning text-dark mt-2">
                <strong>Risk Level:</strong> {{ risk_level }}
            </div>
            {% endif %}
        </div>
    </div>

</body>
</html>
